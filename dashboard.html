<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>হোম | Connectify</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <nav class="navbar">
        <h1>Connectify</h1>
        <div class="user-nav">
            <span>স্বাগতম, ইউজার</span>
            <a href="login.html" style="margin-left: 15px; color: red; text-decoration: none;">লগআউট</a>
        </div>
    </nav>

    <main class="feed">
        <div class="post-box">
            <textarea rows="2" placeholder="আপনার মনে এখন কী চলছে?"></textarea>
            <button class="login-btn" style="width: auto; padding: 8px 20px; margin-top: 10px; font-size: 14px;">পোস্ট</button>
        </div>

        <div class="post">
            <div class="user-info">
                <div class="profile-pic"></div>
                <div>
                    <strong style="display: block;">সাজিদ আহমেদ</strong>
                    <small style="color: #65676b;">২ ঘণ্টা আগে</small>
                </div>
            </div>
            <p>আজকের প্রজেক্টের কাজ প্রায় শেষ! HTML এবং CSS দিয়ে ডিজাইন করা শিখছি।</p>
            
            <div class="post-actions">
                <span>লাইক</span>
                <span>কমেন্ট</span>
                <span>শেয়ার</span>
            </div>
        </div>
    </main>

</body>
</html>
