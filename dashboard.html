<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>হোম | facebook</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <nav class="navbar">
        <h1>facebook</h1>
        <div class="user-nav">
            <span>Welcome</span>
            <a href="login.html" style="margin-left: 15px; color: red; text-decoration: none;">Log out</a>
        </div>
    </nav>

    <main class="feed">
        <div class="post-box">
            <textarea rows="2" placeholder="আপনার মনে এখন কী চলছে?"></textarea>
            <button class="login-btn" style="width: auto; padding: 8px 20px; margin-top: 10px; font-size: 14px;">Posts</button>
        </div>

        <div class="post">
            <div class="user-info">
                <div class="profile-pic"></div>
                <div>
                    <strong style="display: block;">Nakul Chandro</strong>
                    <small style="color: #65676b;">2h</small>
                </div>
            </div>
            <p>আজকের প্রজেক্টের কাজ প্রায় শেষ! HTML, Javascript এবং CSS দিয়ে ডিজাইন করা শিখছি।</p>
            
            <div class="post-actions">
                <span>Like</span>
                <span>Comment</span>
                <span>Share</span>
            </div>
        </div>
    </main>
	<script src="dashboard.js"></script>
</body>
</html>
