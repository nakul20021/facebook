<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন | Connectify</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <h2>Connectify</h2>
        <form action="dashboard.html">
            <input type="text" placeholder="ইমেইল বা ফোন নম্বর" required>
            <input type="password" placeholder="পাসওয়ার্ড" required>
            <button type="submit" class="login-btn">লগইন করুন</button>
        </form>
        
        <a href="#" class="forgot-link">পাসওয়ার্ড ভুলে গেছেন?</a>
        
        <hr>
        
        <button class="create-btn">নতুন অ্যাকাউন্ট তৈরি করুন</button>
    </div>

</body>
</html>
